; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[native_base]
platform = native
test_framework = unity
build_src_filter =
    -<*>

[env:native_device]
extends = native_base
test_filter = test_device
build_flags =
    -std=c++17
    -I test/test_device/mocks     ; suite-specific FIRST (takes priority)
    -I test/mocks                 ; shared mocks SECOND (fallback)
    -I lib/littlefs_native
    -DMG_ENABLE_LOG=0
lib_deps =
    throwtheswitch/Unity@^2.6.1
    lib/littlefs_native

[env:native_utils]
extends = native_base
test_filter = test_utils
build_flags =
    -std=c++17
    -I test/mocks                 ; only shared mocks needed
    -I lib/littlefs_native
    -DMG_ENABLE_LOG=0                         ; ignore all source files

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -I include
monitor_speed = 115200
