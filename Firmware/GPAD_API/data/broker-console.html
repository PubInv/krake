<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Broker Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="appHeader"></header>
  <nav id="sideMenu"></nav>
  <main class="container">
    <div class="status-strip"><div class="chip">Role: <strong id="deviceRole">Krake</strong></div><div class="chip">Broker: <strong id="brokerName">public.cloud.shiftr.io</strong></div></div>
    <section class="card"><h1>Manual Broker Console</h1><p class="subtitle">Publish test messages through the device backend using the configured broker.</p><label for="publishTopic">Topic</label><input id="publishTopic" class="text-input" placeholder="AABBCCDDEEFF_ALM"><div class="button-row"><button id="btnUseAlm" class="action-btn secondary">Use _ALM</button><button id="btnUseAck" class="action-btn secondary">Use _ACK</button></div><label for="publishPayload">Payload</label><textarea id="publishPayload" class="text-input" rows="4" placeholder="a3 20260420_121212 Test alarm"></textarea><div class="button-row"><button id="btnAlarmTemplate" class="action-btn secondary">Alarm template</button><button id="btnInfoTemplate" class="action-btn secondary">Info template</button><button id="btnMuteTemplate" class="action-btn secondary">Mute</button><button id="btnUnmuteTemplate" class="action-btn secondary">Unmute</button><button id="btnSendMessage" class="action-btn">Publish</button></div><div class="status-row">Publish result: <strong id="publishResult">-</strong></div></section>
  </main>

  <footer class="footer"><a href="https://pubinv.org" target="_blank" rel="noopener noreferrer">pubinv.org</a><div id="message" class="note"></div></footer>
  <script src="/js/common.js"></script>
  <script src="/js/broker-console.js"></script>
</body>
</html>
