<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Broker Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="appHeader"></header>
  <nav id="sideMenu"></nav>

  <main class="container">
    <section class="card">
      <h1>Broker Console</h1>
      <p class="subtitle">Publish test payloads to <code>MAC_ALM</code> and monitor ACK behavior from devices.</p>
      <div class="status-row">Broker: <strong id="brokerName">-</strong></div>
      <div class="status-row">Role: <strong id="deviceRole">Krake</strong></div>
      <div id="message" class="note"></div>
    </section>

    <section class="card">
      <h2>Publish</h2>
      <label for="publishTopic">Publish Topic (MAC_ALM)</label>
      <input id="publishTopic" class="text-input" placeholder="AABBCCDDEEFF_ALM" />

      <div class="button-row" style="margin-top:10px;">
        <button id="btnUseAlm" class="action-btn">Use _ALM</button>
        <button id="btnUseAck" class="action-btn secondary">Use _ACK</button>
      </div>

      <label for="publishPayload" style="margin-top:12px; display:block;">Payload</label>
      <textarea id="publishPayload" class="text-input" rows="3" placeholder="a3 20260504123000 Test alarm message"></textarea>

      <div class="button-row" style="margin-top:10px;">
        <button id="btnAlarmTemplate" class="action-btn">Alarm Template</button>
        <button id="btnInfoTemplate" class="action-btn secondary">Info Template</button>
        <button id="btnMuteTemplate" class="action-btn secondary">Mute (S)</button>
        <button id="btnUnmuteTemplate" class="action-btn secondary">Unmute (U)</button>
      </div>

      <button id="btnSendMessage" class="action-btn" style="margin-top:12px;">Send MQTT Message</button>
      <div id="publishResult" class="note"></div>
    </section>

    <section class="card">
      <h2>Web Message</h2>
      <label for="webMessageText">Message Text</label>
      <input id="webMessageText" class="text-input" placeholder="System test message" />
      <button id="btnSendWebMessage" class="action-btn" style="margin-top:12px;">Send as a0 message</button>
      <div id="webMessageResult" class="note"></div>
    </section>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/broker-console.js"></script>
</body>
</html>
