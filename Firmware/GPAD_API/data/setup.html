<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KRAKE WiFi Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/favicon.png" alt="KRAKE icon" class="brand-icon">
      <span>WiFi Setup</span>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>WiFi setup moved</h1>
      <p class="subtitle">WiFi setup is now part of the main Settings page.</p>
      <a href="/settings" class="action-btn" style="display:inline-block; text-decoration:none;">Open Settings</a>
    </section>
  </main>

  <script>
    setTimeout(() => {
      window.location.replace('/settings');
    }, 500);
  </script>
</body>
</html>
